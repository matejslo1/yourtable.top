# ============================================
# YourTable.top — Nginx Configuration
# ============================================
# Serves:
#   /           → Admin panel (React SPA)
#   /widget/    → Widget JS/CSS files
#   /api/       → Reverse proxy to Node.js API (port 3001)
#   /health     → Reverse proxy to API health check

server {
    listen 80 default_server;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── API reverse proxy ────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ─── Health check ─────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Widget static files ──────────────────
    # Served from /widget/ path — restavracija embeda:
    # <script src="https://yourtable.top/widget/widget.iife.js"></script>
    location /widget/ {
        alias /var/www/widget/;
        expires 1h;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # ─── Admin panel (React SPA) ──────────────
    location / {
        root /var/www/web;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
