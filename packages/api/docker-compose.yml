# Optional: Use this if you want local PostgreSQL + Redis
# instead of Supabase cloud. Good for offline development.
#
# Usage: docker compose up -d
# Then set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/yourtable
# and DIRECT_URL to the same.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yourtable
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
