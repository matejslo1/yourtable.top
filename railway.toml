# ============================================
# YourTable.top — Railway Configuration
# ============================================
# Railway avtomatsko zazna Dockerfile in ga zbuilda.
# Nastavi environment variables v Railway dashboardu.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.args]
VITE_API_URL = "${{RAILWAY_PUBLIC_DOMAIN_VALUE}}"
VITE_SUPABASE_URL = "${{SUPABASE_URL}}"
VITE_SUPABASE_ANON_KEY = "${{SUPABASE_ANON_KEY}}"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
